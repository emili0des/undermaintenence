<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quadland Saranda — Coming Soon</title>
    <meta name="description" content="Quadland Saranda Adventure Tours — Off-road ATV experiences in Saranda, Albania. Coming soon.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #1F2D3D;
            --orange: #D97A3C;
            --teal: #3FA9B8;
            --sand: #E8C9A0;
            --cream: #FAF7F2;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--cream);
            color: var(--navy);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Subtle topographic background pattern */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 80%, rgba(63,169,184,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(217,122,60,0.06) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Floating dust particles */
        .particle {
            position: fixed;
            width: 3px;
            height: 3px;
            background: var(--sand);
            border-radius: 50%;
            opacity: 0;
            animation: drift 12s infinite ease-in-out;
        }
        .particle:nth-child(1) { left: 15%; animation-delay: 0s; animation-duration: 14s; }
        .particle:nth-child(2) { left: 35%; animation-delay: 3s; animation-duration: 11s; }
        .particle:nth-child(3) { left: 55%; animation-delay: 6s; animation-duration: 16s; }
        .particle:nth-child(4) { left: 75%; animation-delay: 2s; animation-duration: 13s; }
        .particle:nth-child(5) { left: 90%; animation-delay: 5s; animation-duration: 10s; }
        .particle:nth-child(6) { left: 8%;  animation-delay: 8s; animation-duration: 15s; }

        @keyframes drift {
            0%   { transform: translateY(100vh) scale(1);   opacity: 0; }
            10%  { opacity: 0.4; }
            90%  { opacity: 0.2; }
            100% { transform: translateY(-10vh) scale(0.5); opacity: 0; }
        }

        .container {
            text-align: center;
            padding: 2rem 1.5rem;
            position: relative;
            z-index: 1;
        }

        /* Logo */
        .logo-wrapper {
            animation: logoIn 1s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .logo {
            max-width: 240px;
            width: 70vw;
            filter: drop-shadow(0 8px 24px rgba(31,45,61,0.12));
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .logo:hover {
            transform: scale(1.04) rotate(-1deg);
        }

        @keyframes logoIn {
            from { opacity: 0; transform: translateY(-20px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Divider */
        .divider {
            width: 48px;
            height: 3px;
            background: var(--teal);
            border: none;
            margin: 1.75rem auto;
            border-radius: 2px;
            animation: dividerIn 0.6s 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes dividerIn {
            from { opacity: 0; width: 0; }
            to   { opacity: 1; width: 48px; }
        }

        /* Text */
        .heading {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--navy);
            margin-bottom: 0.5rem;
            animation: fadeUp 0.6s 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .subtext {
            font-size: 0.95rem;
            font-weight: 300;
            color: #6b7a8d;
            line-height: 1.6;
            max-width: 320px;
            margin: 0 auto 2rem;
            animation: fadeUp 0.6s 0.75s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Buttons */
        .actions {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            animation: fadeUp 0.6s 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.7rem 1.5rem;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }
        .btn i { font-size: 1.1rem; }
        .btn svg { width: 18px; height: 18px; flex-shrink: 0; }

        .btn-ig {
            background: var(--orange);
            color: var(--cream);
        }
        .btn-ig:hover {
            background: #c56a2d;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(217,122,60,0.35);
            color: #fff;
        }

        .btn-wa {
            background: transparent;
            color: var(--navy);
            border: 1.5px solid var(--navy);
        }
        .btn-wa:hover {
            background: var(--navy);
            color: var(--cream);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(31,45,61,0.25);
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            padding: 1rem;
            font-size: 0.7rem;
            font-weight: 300;
            color: #a0a8b2;
            letter-spacing: 1px;
            animation: fadeUp 0.6s 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* Mobile tweaks */
        @media (max-width: 480px) {
            .logo { max-width: 200px; }
            .actions { flex-direction: column; align-items: center; }
            .btn { width: 220px; justify-content: center; }
        }
    </style>
</head>

</body>
